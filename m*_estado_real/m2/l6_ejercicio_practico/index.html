<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lección 6 – jQuery</title>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

    <style>
      body {
        background-color: #f0f4f8;
      }
      #mi-lista li {
        font-size: 1.1rem;
      }
    </style>
  </head>

  <body class="py-5">
    <div class="container" style="max-width: 700px;">

      <h1 class="mb-4 text-center">Lección 6 – jQuery</h1>

      <!-- ===== Ejercicio 3: Manipulación del DOM ===== -->
      <section class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Ejercicio 3 – Manipulación del DOM</h5>
        </div>
        <div class="card-body">
          <ul id="mi-lista" class="mb-3">
            <li>Chile</li>
            <li>Argentina</li>
            <li>Perú</li>
          </ul>

          <!-- ===== Ejercicio 4: Eventos ===== -->
          <button id="btn-toggle" class="btn btn-secondary">Ocultar lista</button>
        </div>
      </section>

      <!-- ===== Ejercicio 5: Plugin Bootstrap – Toast ===== -->
      <section class="card mb-4 shadow-sm">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Ejercicio 5 – Plugin Bootstrap: Toast</h5>
        </div>
        <div class="card-body">
          <p>Haz clic en el botón para mostrar una notificación Toast de Bootstrap activada con jQuery.</p>
          <button id="btn-mostrar-toast" class="btn btn-success">Mostrar notificación</button>
        </div>
      </section>

    </div><!-- /container -->

    <!-- Toast Bootstrap -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div
        id="miToast"
        class="toast align-items-center text-white bg-success border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body">
            &#x1F389; Plugin <strong>Toast</strong> de Bootstrap activado con jQuery.
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Cerrar"
          ></button>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS Bundle (incluye Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery 3 CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      $(function () {

        // ── Ejercicio 3: Manipulación del DOM ──────────────────────────────

        // Cambiar el color del texto de todos los <li>
        $('#mi-lista li').css('color', '#0d6efd');

        // Agregar dinámicamente un cuarto elemento
        $('#mi-lista').append('<li>Colombia</li>');


        // ── Ejercicio 4: Eventos ───────────────────────────────────────────

        $('#btn-toggle').on('click', function () {
          var $lista = $('#mi-lista');
          if ($lista.is(':visible')) {
            $lista.hide();
            $(this).text('Mostrar lista');
          } else {
            $lista.show();
            $(this).text('Ocultar lista');
          }
        });


        // ── Ejercicio 5: Plugin Bootstrap – Toast ─────────────────────────

        $('#btn-mostrar-toast').on('click', function () {
          // Se inicializa y muestra el Toast usando la API de Bootstrap 5
          bootstrap.Toast.getOrCreateInstance(document.getElementById('miToast')).show();
        });

      });
    </script>
  </body>
</html>
